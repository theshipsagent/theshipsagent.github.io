<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow - Kanban Task Manager</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface-hover: #fafafa;
  --text: #1a1a2e;
  --text-secondary: #6b7280;
  --border: #e5e7eb;
  --border-light: #f0f0f0;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
  --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-card-hover: 0 4px 12px rgba(0,0,0,0.1), 0 2px 4px rgba(0,0,0,0.06);
  --column-bg: #f8f9fb;
  --column-border: #eceef2;
  --accent: #6366f1;
  --accent-light: #e0e7ff;
  --accent-text: #4338ca;
  --high: #ef4444;
  --high-bg: #fef2f2;
  --high-border: #fecaca;
  --medium: #f59e0b;
  --medium-bg: #fffbeb;
  --medium-border: #fde68a;
  --low: #22c55e;
  --low-bg: #f0fdf4;
  --low-border: #bbf7d0;
  --drop-zone: rgba(99,102,241,0.08);
  --drop-zone-border: #6366f1;
  --transition: 0.2s ease;
}

[data-theme="dark"] {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface-hover: #22223a;
  --text: #e5e7eb;
  --text-secondary: #9ca3af;
  --border: #2d2d44;
  --border-light: #252540;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
  --shadow-card: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-card-hover: 0 4px 12px rgba(0,0,0,0.4), 0 2px 4px rgba(0,0,0,0.3);
  --column-bg: #16162a;
  --column-border: #252540;
  --accent-light: #1e1b4b;
  --accent-text: #a5b4fc;
  --high-bg: #1c0f0f;
  --high-border: #7f1d1d;
  --medium-bg: #1c1708;
  --medium-border: #78350f;
  --low-bg: #0a1c10;
  --low-border: #14532d;
  --drop-zone: rgba(99,102,241,0.15);
}

html {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  transition: background var(--transition), color var(--transition);
}

body {
  min-height: 100vh;
  padding: 0;
}

/* ---- HEADER ---- */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
  transition: background var(--transition), border-color var(--transition);
}

.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.logo svg {
  width: 24px;
  height: 24px;
}

.search-bar {
  flex: 1;
  min-width: 200px;
  max-width: 400px;
  position: relative;
}

.search-bar input {
  width: 100%;
  padding: 8px 12px 8px 36px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;
  background: var(--bg);
  color: var(--text);
  transition: all var(--transition);
  outline: none;
}

.search-bar input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}

.search-bar input::placeholder {
  color: var(--text-secondary);
}

.search-bar svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: var(--text-secondary);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: white;
  box-shadow: var(--shadow-sm);
}

.btn-primary:hover {
  background: #4f46e5;
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

.btn-primary:active {
  transform: translateY(0);
}

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  padding: 8px;
  border-radius: 8px;
}

.btn-ghost:hover {
  background: var(--border-light);
  color: var(--text);
}

.theme-toggle {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  cursor: pointer;
  transition: all var(--transition);
  color: var(--text-secondary);
}

.theme-toggle:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}

.theme-toggle svg {
  width: 18px;
  height: 18px;
}

/* ---- BOARD ---- */
.board {
  max-width: 1400px;
  margin: 24px auto;
  padding: 0 24px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  min-height: calc(100vh - 120px);
}

@media (max-width: 900px) {
  .board {
    grid-template-columns: 1fr;
    gap: 16px;
  }
}

.column {
  background: var(--column-bg);
  border: 1px solid var(--column-border);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  min-height: 300px;
  transition: background var(--transition), border-color var(--transition);
}

.column-header {
  padding: 16px 16px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.column-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.column-dot.todo { background: var(--text-secondary); }
.column-dot.inprogress { background: var(--accent); }
.column-dot.done { background: var(--low); }

.column-title {
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
}

.column-count {
  background: var(--border);
  color: var(--text-secondary);
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: auto;
  transition: all var(--transition);
}

.task-list {
  flex: 1;
  padding: 0 12px 12px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 60px;
  transition: background 0.15s ease;
  border-radius: 0 0 12px 12px;
}

.task-list.drag-over {
  background: var(--drop-zone);
}

/* ---- TASK CARD ---- */
.task-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  cursor: grab;
  box-shadow: var(--shadow-card);
  transition: all 0.2s ease, opacity 0.4s ease;
  position: relative;
  user-select: none;
}

.task-card:hover {
  box-shadow: var(--shadow-card-hover);
  border-color: var(--accent);
  transform: translateY(-1px);
}

.task-card:active {
  cursor: grabbing;
}

.task-card.dragging {
  opacity: 0.4;
  transform: rotate(2deg) scale(0.98);
}

.task-card.fade-out {
  opacity: 0;
  transform: scale(0.9) translateY(-8px);
  max-height: 0;
  padding: 0 12px;
  margin: 0;
  border-width: 0;
  overflow: hidden;
}

.task-card.just-dropped {
  animation: dropBounce 0.3s ease;
}

@keyframes dropBounce {
  0% { transform: scale(0.95); opacity: 0.7; }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); opacity: 1; }
}

.task-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 8px;
}

.task-title {
  font-weight: 500;
  font-size: 13px;
  line-height: 1.4;
  color: var(--text);
  word-break: break-word;
}

.task-delete {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  border-radius: 4px;
  cursor: pointer;
  opacity: 0;
  transition: all var(--transition);
}

.task-card:hover .task-delete {
  opacity: 1;
}

.task-delete:hover {
  background: var(--high-bg);
  color: var(--high);
}

.task-delete svg {
  width: 14px;
  height: 14px;
}

.task-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.priority-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.priority-badge.high {
  background: var(--high-bg);
  color: var(--high);
  border: 1px solid var(--high-border);
}

.priority-badge.medium {
  background: var(--medium-bg);
  color: var(--medium);
  border: 1px solid var(--medium-border);
}

.priority-badge.low {
  background: var(--low-bg);
  color: var(--low);
  border: 1px solid var(--low-border);
}

.task-date {
  font-size: 11px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 4px;
}

.task-date svg {
  width: 12px;
  height: 12px;
}

/* ---- MODAL ---- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  width: 90%;
  max-width: 440px;
  box-shadow: var(--shadow-lg);
  transform: scale(0.95) translateY(10px);
  transition: transform 0.2s ease;
}

.modal-overlay.open .modal {
  transform: scale(1) translateY(0);
}

.modal h2 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 20px;
  color: var(--text);
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-group input,
.form-group select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  background: var(--bg);
  color: var(--text);
  transition: all var(--transition);
  outline: none;
}

.form-group input:focus,
.form-group select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 20px;
}

.btn-secondary {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  background: var(--border-light);
}

/* ---- CONFETTI ---- */
.confetti-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;
  overflow: hidden;
}

.confetti-piece {
  position: absolute;
  width: 8px;
  height: 8px;
  opacity: 0;
}

@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ---- EMPTY STATE ---- */
.empty-state {
  text-align: center;
  padding: 24px 16px;
  color: var(--text-secondary);
  font-size: 13px;
}

/* ---- DRAG PLACEHOLDER ---- */
.drag-placeholder {
  border: 2px dashed var(--drop-zone-border);
  border-radius: 8px;
  background: var(--drop-zone);
  min-height: 60px;
  transition: all 0.15s ease;
}

/* ---- SUBTITLE ---- */
.subtitle {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 400;
  margin-left: 4px;
}

/* ---- SCROLLBAR ---- */
.task-list::-webkit-scrollbar {
  width: 4px;
}
.task-list::-webkit-scrollbar-track {
  background: transparent;
}
.task-list::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 4px;
}

/* Priority strip on left side of card */
.task-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 8px;
  bottom: 8px;
  width: 3px;
  border-radius: 0 2px 2px 0;
  transition: background var(--transition);
}

.task-card.priority-high::before { background: var(--high); }
.task-card.priority-medium::before { background: var(--medium); }
.task-card.priority-low::before { background: var(--low); }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      TaskFlow
      <span class="subtitle">Kanban Board</span>
    </div>
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search tasks..." />
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" id="addTaskBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Task
      </button>
      <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
        <svg id="sunIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="moonIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</header>

<!-- BOARD -->
<div class="board">
  <div class="column" data-status="todo">
    <div class="column-header">
      <div class="column-dot todo"></div>
      <span class="column-title">To Do</span>
      <span class="column-count" data-count="todo">0</span>
    </div>
    <div class="task-list" data-status="todo"></div>
  </div>
  <div class="column" data-status="inprogress">
    <div class="column-header">
      <div class="column-dot inprogress"></div>
      <span class="column-title">In Progress</span>
      <span class="column-count" data-count="inprogress">0</span>
    </div>
    <div class="task-list" data-status="inprogress"></div>
  </div>
  <div class="column" data-status="done">
    <div class="column-header">
      <div class="column-dot done"></div>
      <span class="column-title">Done</span>
      <span class="column-count" data-count="done">0</span>
    </div>
    <div class="task-list" data-status="done"></div>
  </div>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>New Task</h2>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="taskTitle" placeholder="What needs to be done?" autofocus />
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="taskPriority">
        <option value="medium">Medium</option>
        <option value="high">High</option>
        <option value="low">Low</option>
      </select>
    </div>
    <div class="form-group">
      <label>Due Date</label>
      <input type="date" id="taskDue" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
      <button class="btn btn-primary" id="saveTaskBtn">Add Task</button>
    </div>
  </div>
</div>

<!-- CONFETTI CONTAINER -->
<div class="confetti-container" id="confettiContainer"></div>

<script>
(function() {
  'use strict';

  // ---- STATE ----
  const STORAGE_KEY = 'taskflow_tasks';
  const THEME_KEY = 'taskflow_theme';

  const defaultTasks = [
    { id: genId(), title: 'Design new landing page wireframes', priority: 'high', due: '2026-04-02', status: 'todo', order: 0 },
    { id: genId(), title: 'Set up CI/CD pipeline for staging', priority: 'medium', due: '2026-04-05', status: 'todo', order: 1 },
    { id: genId(), title: 'Review pull request #247', priority: 'low', due: '2026-03-30', status: 'inprogress', order: 0 },
    { id: genId(), title: 'Write API documentation for v2 endpoints', priority: 'medium', due: '2026-04-01', status: 'inprogress', order: 1 },
    { id: genId(), title: 'Fix authentication token refresh bug', priority: 'high', due: '2026-03-28', status: 'done', order: 0 },
  ];

  let tasks = loadTasks();
  let draggedId = null;

  // ---- HELPERS ----
  function genId() {
    return 'task_' + Math.random().toString(36).slice(2, 11) + Date.now().toString(36);
  }

  function loadTasks() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed) && parsed.length > 0) return parsed;
      }
    } catch(e) {}
    return JSON.parse(JSON.stringify(defaultTasks));
  }

  function saveTasks() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  // ---- RENDERING ----
  function render(filter) {
    filter = (filter || '').toLowerCase().trim();
    const statuses = ['todo', 'inprogress', 'done'];

    statuses.forEach(status => {
      const list = document.querySelector(`.task-list[data-status="${status}"]`);
      const countEl = document.querySelector(`[data-count="${status}"]`);
      const columnTasks = tasks
        .filter(t => t.status === status)
        .sort((a, b) => a.order - b.order);

      const filtered = filter
        ? columnTasks.filter(t => t.title.toLowerCase().includes(filter))
        : columnTasks;

      countEl.textContent = filtered.length;
      list.innerHTML = '';

      if (filtered.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = filter ? 'No matching tasks' : 'Drop tasks here';
        list.appendChild(empty);
        return;
      }

      filtered.forEach(task => {
        list.appendChild(createCard(task));
      });
    });
  }

  function createCard(task) {
    const card = document.createElement('div');
    card.className = `task-card priority-${task.priority}`;
    card.setAttribute('draggable', 'true');
    card.dataset.id = task.id;

    card.innerHTML = `
      <div class="task-top">
        <span class="task-title">${escapeHtml(task.title)}</span>
        <button class="task-delete" title="Delete task">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="task-meta">
        <span class="priority-badge ${task.priority}">${task.priority}</span>
        ${task.due ? `<span class="task-date"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${formatDate(task.due)}</span>` : ''}
      </div>
    `;

    // Delete handler
    card.querySelector('.task-delete').addEventListener('click', (e) => {
      e.stopPropagation();
      card.style.transition = 'all 0.35s ease';
      card.classList.add('fade-out');
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== task.id);
        saveTasks();
        render(document.getElementById('searchInput').value);
      }, 350);
    });

    // Drag handlers
    card.addEventListener('dragstart', (e) => {
      draggedId = task.id;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', task.id);
    });

    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      draggedId = null;
      clearAllDragStyles();
    });

    return card;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ---- DRAG & DROP ----
  function setupDragDrop() {
    document.querySelectorAll('.task-list').forEach(list => {
      list.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        list.classList.add('drag-over');

        // Find insertion point
        const afterElement = getDragAfterElement(list, e.clientY);
        const placeholder = list.querySelector('.drag-placeholder') || createPlaceholder();

        if (afterElement) {
          list.insertBefore(placeholder, afterElement);
        } else {
          list.appendChild(placeholder);
        }
      });

      list.addEventListener('dragleave', (e) => {
        if (!list.contains(e.relatedTarget)) {
          list.classList.remove('drag-over');
          removePlaceholder(list);
        }
      });

      list.addEventListener('drop', (e) => {
        e.preventDefault();
        list.classList.remove('drag-over');
        removePlaceholder(list);

        if (!draggedId) return;

        const newStatus = list.dataset.status;
        const task = tasks.find(t => t.id === draggedId);
        if (!task) return;

        const oldStatus = task.status;
        const afterElement = getDragAfterElement(list, e.clientY);

        // Calculate new order
        const siblingCards = [...list.querySelectorAll('.task-card:not(.dragging)')];
        let newOrder;

        if (afterElement) {
          const afterId = afterElement.dataset.id;
          const afterTask = tasks.find(t => t.id === afterId);
          newOrder = afterTask ? afterTask.order : 0;
          // Shift tasks down
          tasks.filter(t => t.status === newStatus && t.order >= newOrder && t.id !== task.id)
            .forEach(t => t.order++);
        } else {
          const maxOrder = Math.max(-1, ...tasks.filter(t => t.status === newStatus && t.id !== task.id).map(t => t.order));
          newOrder = maxOrder + 1;
        }

        task.status = newStatus;
        task.order = newOrder;
        saveTasks();
        render(document.getElementById('searchInput').value);

        // Animate the dropped card
        const droppedCard = document.querySelector(`[data-id="${draggedId}"]`);
        if (droppedCard) {
          droppedCard.classList.add('just-dropped');
          setTimeout(() => droppedCard.classList.remove('just-dropped'), 300);
        }

        // Confetti when moved to Done
        if (newStatus === 'done' && oldStatus !== 'done') {
          fireConfetti();
        }
      });
    });
  }

  function getDragAfterElement(list, y) {
    const cards = [...list.querySelectorAll('.task-card:not(.dragging)')];
    let closest = null;
    let closestOffset = Number.POSITIVE_INFINITY;

    cards.forEach(card => {
      const box = card.getBoundingClientRect();
      const offset = y - box.top - box.height / 2;
      if (offset < 0 && offset > -closestOffset) {
        closestOffset = -offset;
        closest = card;
      }
    });

    return closest;
  }

  function createPlaceholder() {
    const ph = document.createElement('div');
    ph.className = 'drag-placeholder';
    return ph;
  }

  function removePlaceholder(list) {
    const ph = list.querySelector('.drag-placeholder');
    if (ph) ph.remove();
  }

  function clearAllDragStyles() {
    document.querySelectorAll('.task-list').forEach(l => {
      l.classList.remove('drag-over');
      removePlaceholder(l);
    });
  }

  // ---- CONFETTI ----
  function fireConfetti() {
    const container = document.getElementById('confettiContainer');
    const colors = ['#6366f1', '#22c55e', '#f59e0b', '#ef4444', '#ec4899', '#3b82f6', '#8b5cf6'];
    const shapes = ['square', 'circle'];
    const count = 60;

    for (let i = 0; i < count; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      const color = colors[Math.floor(Math.random() * colors.length)];
      const shape = shapes[Math.floor(Math.random() * shapes.length)];
      const size = Math.random() * 6 + 5;
      const left = Math.random() * 100;
      const delay = Math.random() * 0.5;
      const duration = Math.random() * 1.5 + 1.5;

      piece.style.cssText = `
        left: ${left}%;
        top: -10px;
        width: ${size}px;
        height: ${size}px;
        background: ${color};
        border-radius: ${shape === 'circle' ? '50%' : '2px'};
        animation: confettiFall ${duration}s ease-out ${delay}s forwards;
      `;

      container.appendChild(piece);
    }

    setTimeout(() => {
      container.innerHTML = '';
    }, 3000);
  }

  // ---- MODAL ----
  const modal = document.getElementById('modalOverlay');
  const titleInput = document.getElementById('taskTitle');
  const priorityInput = document.getElementById('taskPriority');
  const dueInput = document.getElementById('taskDue');

  function openModal() {
    titleInput.value = '';
    priorityInput.value = 'medium';
    dueInput.value = '';
    modal.classList.add('open');
    setTimeout(() => titleInput.focus(), 100);
  }

  function closeModal() {
    modal.classList.remove('open');
  }

  function saveNewTask() {
    const title = titleInput.value.trim();
    if (!title) {
      titleInput.style.borderColor = 'var(--high)';
      titleInput.focus();
      setTimeout(() => titleInput.style.borderColor = '', 1500);
      return;
    }

    const maxOrder = Math.max(-1, ...tasks.filter(t => t.status === 'todo').map(t => t.order));
    tasks.push({
      id: genId(),
      title,
      priority: priorityInput.value,
      due: dueInput.value || '',
      status: 'todo',
      order: maxOrder + 1,
    });

    saveTasks();
    closeModal();
    render(document.getElementById('searchInput').value);
  }

  document.getElementById('addTaskBtn').addEventListener('click', openModal);
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  document.getElementById('saveTaskBtn').addEventListener('click', saveNewTask);

  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });

  // Enter key in modal
  titleInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') saveNewTask();
  });

  // Escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // ---- SEARCH ----
  document.getElementById('searchInput').addEventListener('input', (e) => {
    render(e.target.value);
  });

  // ---- THEME ----
  function initTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    setTheme(theme);
  }

  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem(THEME_KEY, theme);
    document.getElementById('sunIcon').style.display = theme === 'light' ? 'block' : 'none';
    document.getElementById('moonIcon').style.display = theme === 'dark' ? 'block' : 'none';
  }

  document.getElementById('themeToggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    setTheme(current === 'light' ? 'dark' : 'light');
  });

  // ---- INIT ----
  initTheme();
  render();
  setupDragDrop();
})();
</script>
</body>
</html>
